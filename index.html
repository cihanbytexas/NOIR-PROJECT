<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOIR | Secure Network</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="appContainer">
        <header>
            <div class="logo-container">
                <button class="menu-btn" aria-label="Menü">☰</button>
                <div class="logo">NOIR</div>
            </div>
            <!-- Dil Değiştirme Butonu -->
            <div class="lang-toggle" id="langToggleBtn">TR / EN</div>
        </header>

        <main>
            <div class="auth-container">
                <!-- Tek Merkezli Bağlantı Butonu -->
                <button class="btn btn-dark" id="openAuthBtn" data-i18n="main_btn">GİRİŞ / KAYIT</button>
            </div>

            <div class="stats-container">
                <div class="stat-box">
                    <div class="stat-title" data-i18n="online_title">ONLİNE</div>
                    <div class="stat-value">
                        <div class="online-dot"></div> 
                        <span id="onlineCount">...</span>
                    </div>
                </div>
                <div class="stat-box">
                    <div class="stat-title" data-i18n="total_title">ALL USER</div>
                    <div class="stat-value" id="totalCount">...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Alttan Açılan Gelişmiş Panel -->
    <div id="authSheet" class="sheet-overlay">
        <div class="sheet-content">
            <div class="sheet-handle" id="closeSheetBtn"></div>
            
            <!-- Sekmeler (Tabs) -->
            <div class="auth-tabs">
                <button class="tab-btn active" id="tabLoginBtn" data-i18n="tab_login">Giriş Yap</button>
                <button class="tab-btn" id="tabRegisterBtn" data-i18n="tab_register">Kayıt Ol</button>
            </div>

            <!-- Giriş Formu -->
            <form id="loginForm" class="form-wrapper">
                <div class="input-group">
                    <input type="text" id="loginUsername" placeholder="Kullanıcı Adı" data-i18n-ph="ph_username" autocomplete="off" required>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="Şifre" data-i18n-ph="ph_password" required>
                </div>
                <button type="submit" class="btn btn-dark form-submit" data-i18n="btn_connect">Sisteme Bağlan</button>
            </form>

            <!-- Kayıt Formu (Başlangıçta Gizli) -->
            <form id="registerForm" class="form-wrapper hidden">
                <div class="input-group">
                    <input type="text" id="registerUsername" placeholder="Benzersiz Kullanıcı Adı" data-i18n-ph="ph_unique_user" autocomplete="off" required>
                </div>
                <div class="input-group">
                    <input type="password" id="registerPassword" placeholder="Şifre Oluştur" data-i18n-ph="ph_create_pass" required>
                </div>
                <button type="submit" class="btn btn-dark form-submit" data-i18n="btn_create">Hesap Oluştur</button>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
