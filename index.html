<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOIR | Secure Network</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="appContainer">
        <header>
            <div class="logo-container">
                <button class="menu-btn" aria-label="Menü">☰</button>
                <div class="logo">NOIR</div>
            </div>
            <div class="lang-toggle">TR / EN</div>
        </header>

        <main>
            <div class="auth-container">
                <button class="btn btn-dark" id="openLoginBtn">Giriş Yap</button>
                <button class="btn btn-outline" id="openRegisterBtn">Kayıt Ol</button>
            </div>

            <div class="stats-container">
                <div class="stat-box">
                    <div class="stat-title">Online</div>
                    <div class="stat-value">
                        <div class="online-dot"></div> 
                        <span id="onlineCount">...</span>
                    </div>
                </div>
                <div class="stat-box">
                    <div class="stat-title">All User</div>
                    <div class="stat-value" id="totalCount">...</div>
                </div>
            </div>
        </main>
    </div>

    <div id="authSheet" class="sheet-overlay">
        <div class="sheet-content">
            <div class="sheet-handle" id="closeSheetBtn"></div>
            
            <form id="loginForm" class="form-wrapper">
                <h2 class="form-title">GİRİŞ PROTOKOLÜ</h2>
                <div class="input-group">
                    <input type="text" id="loginUsername" placeholder="Kullanıcı Adı" autocomplete="off" required>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="Şifre" required>
                </div>
                <button type="submit" class="btn btn-dark form-submit">Sisteme Bağlan</button>
            </form>

            <form id="registerForm" class="form-wrapper hidden">
                <h2 class="form-title">YENİ KAYIT</h2>
                <div class="input-group">
                    <input type="text" id="registerUsername" placeholder="Benzersiz Kullanıcı Adı" autocomplete="off" required>
                </div>
                <div class="input-group">
                    <input type="password" id="registerPassword" placeholder="Şifre Oluştur" required>
                </div>
                <button type="submit" class="btn btn-dark form-submit">Hesap Oluştur</button>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
